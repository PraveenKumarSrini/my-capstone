services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: devpulse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  postgres-test:
    image: postgres:16
    environment:
      POSTGRES_DB: devpulse_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5433:5432'

volumes:
  pgdata:
